name: Build EXE and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build EXE
        run: pyinstaller app.spec

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LuanChuyenHangHoa.exe
          name: "Phiên bản ${{ github.ref_name }}"
          body: "Tải file exe về và chạy trực tiếp, không cần cài Python."
